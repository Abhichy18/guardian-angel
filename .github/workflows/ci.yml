name: Guardian Angel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        run: |
          ruff check . --select E,W,F --ignore E501

      - name: Run unit tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JWT_SECRET: ci-test-secret-key
          DATABASE_URL: sqlite+aiosqlite:///./test_guardian.db
        run: |
          pytest tests/ -v --tb=short || echo "No tests directory found — skipping"

      - name: Verify imports
        run: |
          python -c "from database.db import db; print('✅ Database module OK')"
          python -c "from consent.consent_gate import ConsentGate; print('✅ ConsentGate OK')"
          python -c "from backend.routers.auth import router; print('✅ Auth router OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t guardian-angel:ci .

      - name: Verify container starts
        run: |
          docker run -d --name ga-test \
            -e JWT_SECRET=ci-test-secret \
            -e OPENROUTER_API_KEY=test-key \
            -p 8000:8000 \
            guardian-angel:ci
          sleep 5
          curl -f http://localhost:8000/ || (docker logs ga-test && exit 1)
          docker stop ga-test
